name: Build Mac App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Mac app
        run: npx electron-builder --mac

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist
